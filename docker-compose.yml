version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public
      - backend
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      ENVIRONMENT: prod
      # Si se usa llama.cpp externo, descomentar y apuntar al endpoint.
      # LLAMA_SERVER_URL: http://llama-server:8080
    expose:
      - "8000"
    networks:
      - backend
    restart: unless-stopped

networks:
  public:
  backend:
    internal: true
